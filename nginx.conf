server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # config.json served from bind mount — never cached
    location = /config.json {
        alias /config/config.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json";
    }

    # system.json served from shared volume — never cached
    location = /system.json {
        alias /system/system.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json";
    }

    location = /api/munin/events/upcoming {
        proxy_pass ${MUNIN_BASE_URL}/api/v1/events/upcoming$is_args$args;
        proxy_set_header Authorization "Bearer ${EVENTS_API_SECRET}";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
    }

    location = /api/munin/cyber/announcements/latest {
        proxy_pass ${MUNIN_BASE_URL}/api/v1/cyber/announcements/latest;
        proxy_set_header Authorization "Bearer ${EVENTS_API_SECRET}";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
    }

    location = /api/quotes/today {
        proxy_pass https://zenquotes.io/api/today;
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets — long-lived cache (Vite fingerprints filenames)
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;
}
