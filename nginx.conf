server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # config.json served from bind mount — never cached
    location = /config.json {
        alias /config/config.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json";
    }

    # system.json served from shared volume — never cached
    location = /system.json {
        alias /system/system.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets — long-lived cache (Vite fingerprints filenames)
    location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;
}
